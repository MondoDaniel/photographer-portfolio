<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Parlons de votre projet</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/script.js"></script>
</head>
<body>

    <!--en tete (identique)-->
    <header class="main-header">
        <nav class="navbar">
            <div class="logo"> <a href="index.html">PhotoStudio</a></div>
            <div class="menu-toggle" id="mobile-menu"><i class="fas fa-bars"></i></div>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!--titre de page-->
    <section class="contact-hero">
        <div class="container">
            <h1>Parlons de votre projet</h1>
            <p>Une question ? Une envie de shooting ? N'hésitez pas à m'écrire.</p>
        </div>
    </section>

    <!--section contact-->
    <section class="contact-section">
        <div class="container contact-wrapper">
            
            <!--formulaire-->
            <div class="contact-form-side">
                <h2>Envoyez un message</h2>
                <form action="#">
                    <div class="form-group">
                        <input type="text" placeholder="Votre Nom" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Votre Email" required>
                    </div>
                    <div class="form-group">
                        <input type="text" placeholder="Sujet">
                    </div>
                    <div class="form-group">
                        <textarea placeholder="Votre Message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn-cta">Envoyer le message</button>
                </form>
            </div>

            <!--infos de contact-->
            <div class="contact-info-side">
                <h3>Coordonnées</h3>
                <div class="info-item">
                    <i class="fas fa-phone"></i>
                    <p>+237 659 567 429</p>
                </div>
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <p>contact@photostudio.com</p>
                </div>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <p>237 Avenue des Avocats, PK 17</p>
                </div>
            </div>
        </div>
    </section>

    <!--google maps-->
    <section class="map-section">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2624.9916256937595!2d2.2922926156743895!3d48.85837007928746!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47e66e2964e34e2d%3A0x8ddca97efa85c5b4!2sTour%20Eiffel!5e0!3m2!1sfr!2sfr!4v1625123456789!5m2!1sfr!2sfr" 
            width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy">
        </iframe>
    </section>

    <!--pied de page-->
<footer class="main-footer">
    <div class="container footer-content">
        <!--copyright-->
        <div class="footer-copyright">
            <p>&copy; 2026 <span class="logo-footer">PhotoStudio</span>. Tous droits réservés.</p>
        </div>

        <!--réseaux sociaux-->
        <div class="footer-socials">
            <a href="#" class="social-icon" aria-label="Facebook">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="#" class="social-icon" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="#" class="social-icon" aria-label="LinkedIn">
                <i class="fab fa-linkedin-in"></i>
            </a>
        </div>
    </div>
</footer>

    
</body>
</html>
